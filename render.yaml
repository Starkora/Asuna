services:
  - type: web
    name: asuna-whatsapp-bot
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: ERP_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v22.0
      - key: REQUEST_TIMEOUT_SECONDS
        value: "20"
      - key: SQLITE_PATH
        value: /var/data/notifications.db
    disks:
      - name: asuna-data
        mountPath: /var/data
        sizeGB: 1
